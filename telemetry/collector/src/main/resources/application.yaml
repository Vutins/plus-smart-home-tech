spring:
  application:
    name: collector
  config:
    # ✅ "optional:" позволяет приложению запуститься, если конфиг-сервер недоступен
    import: "optional:configserver:http://localhost:8888"
  cloud:
    config:
      # ✅ Не прерывать запуск при ошибке подключения
      fail-fast: false
      # ✅ Не искать конфиг-сервер через Eureka (локально)
      discovery:
        enabled: false
        serviceId: config-server
  # ✅ Локальная конфигурация Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.practicum.serializer.GeneralAvroSerializer

# ✅ Отключаем Eureka для локального запуска
eureka:
  client:
    enabled: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ✅ Порт сервера
server:
  port: 8080

# ✅ Логирование для отладки
logging:
  level:
    ru.yandex.practicum: DEBUG
    org.springframework.web: INFO
    org.apache.kafka: WARN